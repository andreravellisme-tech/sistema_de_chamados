<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Relatórios — Admin | TI Chamados</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .report-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .report-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px; }
    .report-card h3 { font-size: .95rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .bar-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-label { font-size: .8rem; width: 140px; flex-shrink: 0; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
    .bar-count { font-size: .8rem; font-family: var(--font-mono); color: var(--text2); width: 28px; text-align: right; }
    .pie-legend { display: flex; flex-direction: column; gap: 8px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: .83rem; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div id="topbar-container"></div>
    <div class="page-body">
      <div class="page-header">
        <div><h2>📈 Relatórios</h2><p>Visão consolidada dos chamados do sistema</p></div>
        <div style="display:flex;gap:10px;align-items:center">
          <label style="font-size:.83rem;color:var(--text2)">Período:</label>
          <select class="form-control" id="periodo" onchange="gerarRelatorio()" style="width:160px">
            <option value="7">Últimos 7 dias</option>
            <option value="30" selected>Últimos 30 dias</option>
            <option value="90">Últimos 90 dias</option>
            <option value="365">Último ano</option>
            <option value="0">Todos</option>
          </select>
        </div>
      </div>

      <div class="stats-grid" id="stats-rel"></div>

      <div class="report-grid">
        <div class="report-card"><h3>📊 Por Status</h3><div id="chart-status"></div></div>
        <div class="report-card"><h3>⚡ Por Prioridade</h3><div id="chart-prioridade"></div></div>
        <div class="report-card"><h3>🗂️ Por Categoria</h3><div id="chart-categoria"></div></div>
        <div class="report-card"><h3>🏫 Por Unidade (Top 10)</h3><div id="chart-unidade"></div></div>
        <div class="report-card"><h3>👤 Por Técnico</h3><div id="chart-tecnico"></div></div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/layout.js"></script>
<script>
(async () => {
  const { user, perfil } = await Auth.requireAuth(['admin']);
  Layout.renderSidebar('admin', 'relatorios', perfil);
  Layout.renderTopbar('Relatórios');
  NotifManager.iniciar(user.uid, perfil.perfil);
  await gerarRelatorio();
})();

async function gerarRelatorio() {
  showLoading('Gerando relatório...');
  try {
    const dias = parseInt(document.getElementById('periodo').value);
    let query = db.collection('chamados');
    if (dias > 0) {
      const desde = new Date();
      desde.setDate(desde.getDate() - dias);
      query = query.where('criadoEm', '>=', firebase.firestore.Timestamp.fromDate(desde));
    }
    const snap = await query.get();
    const chamados = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderRelatorio(chamados);
  } catch(e) { Toast.error('Erro: '+e.message); }
  finally { hideLoading(); }
}

function renderRelatorio(chamados) {
  const total = chamados.length;
  const resolvidos = chamados.filter(c=>c.status==='resolvido').length;
  const abertos = chamados.filter(c=>c.status==='aberto').length;
  const semTecnico = chamados.filter(c=>!c.tecnicoId).length;

  document.getElementById('stats-rel').innerHTML = `
    <div class="stat-card info"><div class="stat-icon">📋</div><div class="stat-value">${total}</div><div class="stat-label">Total de Chamados</div></div>
    <div class="stat-card success"><div class="stat-icon">✅</div><div class="stat-value">${resolvidos}</div><div class="stat-label">Resolvidos</div></div>
    <div class="stat-card danger"><div class="stat-icon">🔴</div><div class="stat-value">${abertos}</div><div class="stat-label">Em Aberto</div></div>
    <div class="stat-card warning"><div class="stat-icon">⚠️</div><div class="stat-value">${semTecnico}</div><div class="stat-label">Sem Técnico</div></div>`;

  const statusCores = { aberto:'#ef4444', andamento:'#f59e0b', aguardando:'#38bdf8', resolvido:'#22c55e', cancelado:'#6e7681' };
  const prioCores = { critica:'#ef4444', alta:'#f97316', media:'#f59e0b', baixa:'#22c55e' };

  renderBars('chart-status', contarPor(chamados,'status'), statusCores, STATUS_CONFIG);
  renderBars('chart-prioridade', contarPor(chamados,'prioridade'), prioCores, PRIORIDADE_CONFIG);
  renderBars('chart-categoria', contarPor(chamados,'categoria'), null, null, '#2563eb');
  renderBars('chart-unidade', contarPor(chamados,'unidadeNome'), null, null, '#7c3aed', 10);
  renderBars('chart-tecnico', contarPor(chamados,'tecnicoNome'), null, null, '#0891b2');
}

function contarPor(chamados, campo) {
  const mapa = {};
  chamados.forEach(c => {
    const val = c[campo] || (campo === 'tecnicoNome' ? 'Sem técnico' : 'Não informado');
    mapa[val] = (mapa[val] || 0) + 1;
  });
  return Object.entries(mapa).sort((a,b) => b[1]-a[1]);
}

function renderBars(elId, dados, cores, config, defaultCor='#2563eb', limite=20) {
  const el = document.getElementById(elId);
  if (!dados.length) { el.innerHTML = `<p class="text-muted text-sm">Nenhum dado.</p>`; return; }
  const max = dados[0][1];
  el.innerHTML = dados.slice(0,limite).map(([label, count]) => {
    const cor = (cores && cores[label]) || defaultCor;
    const nomeExibido = (config && config[label]?.label) || label;
    const pct = max > 0 ? Math.round(count/max*100) : 0;
    return `<div class="bar-item">
      <span class="bar-label" title="${sanitize(nomeExibido)}">${sanitize(nomeExibido)}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cor}"></div></div>
      <span class="bar-count">${count}</span>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
