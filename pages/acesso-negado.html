<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acesso Negado | TI Chamados</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div style="text-align:center;max-width:400px;padding:40px;">
    <div style="font-size:4rem;margin-bottom:16px">🚫</div>
    <h1 style="font-size:1.4rem;margin-bottom:8px">Acesso Negado</h1>
    <p style="color:var(--text2);margin-bottom:24px">Você não tem permissão para acessar esta página.</p>
    <button class="btn btn-primary" onclick="voltar()">← Voltar</button>
  </div>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    function voltar() {
      auth.onAuthStateChanged(async user => {
        if (!user) { window.location.href='/index.html'; return; }
        const snap = await db.collection('usuarios').doc(user.uid).get();
        const perfil = snap.exists ? snap.data().perfil : null;
        if (perfil==='admin') window.location.href='admin-dashboard.html';
        else if (perfil==='tecnico') window.location.href='tecnico-dashboard.html';
        else window.location.href='solicitante-dashboard.html';
      });
    }
  </script>
</body>
</html>
